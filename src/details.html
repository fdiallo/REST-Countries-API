<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" href="detailStyle.css">
    <title>REST Countries Api - Details Page</title>
</head>

<body>

    <div class="card h-100">
        <img id="countryFlag" src="" class="card-img-top p-3" style="height: 200px; object-fit: contain;"
            alt=${country.name.common}>
        <div class="card-body">
            <h5 id="countryName" class="card-title text-truncate"></h5>
            <p id="countryPop" class="card-text">Population: ${country.population}</p>
            <p id="countryRegion" class="card-text">Region: ${country.region}</p>
            <p id="countryCapital" class="card-text">Capital: ${country.capital}</p>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const flag = params.get('flag')
        const name = params.get('name');
        const population = params.get('population')
        const region = params.get('region')
        const capital = params.get('capital')

        if (flag !== "" && name !== "") {
            document.getElementById("countryFlag").src = flag
            document.getElementById("countryName").textContent = name
            document.getElementById("countryPop").textContent = `Population: ${population}`
            document.getElementById("countryRegion").textContent = `Region: ${region}`
            document.getElementById("countryCapital").textContent = `Capital: ${capital}`
        }
    </script>

</body>

</html>
